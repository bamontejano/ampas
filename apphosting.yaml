# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Minimum instances to keep warm (0 = scale to zero, costs less)
  minInstances: 0
  # Maximum concurrent requests per instance
  concurrency: 80
  # CPU units (1 = 1 vCPU)
  cpu: 1
  # Memory in MiB
  memoryMiB: 512

env:
  # Public Firebase config — safe to expose
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_SITE_URL
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_ROOT_DOMAIN
    availability:
      - BUILD
      - RUNTIME

  # Secret variables — stored in Cloud Secret Manager, never exposed in code
  - variable: FIREBASE_CLIENT_EMAIL
    secret: firebase-client-email
    availability:
      - RUNTIME

  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability:
      - RUNTIME
